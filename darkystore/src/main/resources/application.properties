spring.application.name=darkystore

## LOGGER Slf4j
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
logging.level.root=${LOG_LEVEL:ERROR}
logging.file.name=${LOG_FILE_NAME:C:/Users/dark/Desktop/logs/app.log}
logging.pattern.file={"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","logger":"%c","message":"%m"}

## PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres.lan:5432/darkyshop?reWriteBatchedInserts=true&options=-c%20timezone=UTC
spring.datasource.username=dark
spring.datasource.password=dark

## JPA
# create and drop table, good for testing, production set to none or comment it
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

## FLYWAY
#spring.flyway.locations=classpath:db.migration
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://postgres.lan:5432/darkyshop
spring.flyway.user=dark
spring.flyway.password=dark
#spring.flyway.baseline-on-migrate=true

stripe.apiKey=${STRIPE_API_KEY:none}